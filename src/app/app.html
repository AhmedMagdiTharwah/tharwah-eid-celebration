<div class="app-shell" [dir]="langService.dir()">
  <!-- Header -->
  <header class="app-header">
    <div class="header-content">
      <div class="brand">
        <span class="brand-icon">🌙</span>
        <span class="brand-text">{{ langService.t('app.title') }}</span>
      </div>
      <button class="lang-toggle" (click)="langService.toggleLanguage()">
        {{ langService.currentLang() === 'ar' ? 'EN' : 'عربي' }}
      </button>
    </div>
  </header>

  <!-- Main Content -->
  <main class="app-main">
    <router-outlet />
  </main>

  <!-- Footer -->
  <footer class="app-footer">
    <p>&copy; 2026 Tharwah &mdash; {{ langService.currentLang() === 'ar' ? 'كل عام وأنتم بخير' : 'Eid Mubarak' }}</p>
  </footer>
</div>
